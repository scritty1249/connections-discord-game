<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <link rel="stylesheet" href="/stylesheets/styles-<!--BUILD_ID-->.css"/>
        <script type="module" src="/script/bundle-<!--BUILD_ID-->.js" defer></script>
    </head>
    <body>
        <div style="visibility:hidden;" id="build-ver"><!--BUILD_ID--></div>
        <div id="loading">
            <div>
                <div class="icon"></div>
                <div class="title thick">Connections</div>
                <div class="posh">Ready to get started?</div>
                <div id="loading-bar" class="progress-bar"></div>
                <div class="light"><span class="bold">Pro Tip:</span> The mitochondria is the powerhouse of the cell</div>
            </div>
            <div class="footer">
                <div class="fancy">Just <span class="thick">Games</span></div>
                <div class="tiny">Build <!--BUILD_ID_SHORT--></div>
            </div>
        </div>
        <div id="content-container" class="hide">
            <div id="card-grid">
                <div id="categories"></div>
                <div id="words"></div>
            </div>
            <div id="ongoing-stats">
                Attempt No.
                <span id="attempt-count">1</span>
            </div>
            <div id="buttons">
                <div id="shuffle" class="pill">shuffle</div>
                <div id="deselect" class="pill disabled">deselect all</div>
                <div id="submit" class="pill disabled">submit</div>
            </div>
        </div>
    </body>
</html>
